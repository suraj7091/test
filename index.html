<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Funny Button Page</title>

    <style>
        body {
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f6d365, #fda085);
            font-family: Arial, sans-serif;
        }

        .box {
            text-align: center;
        }

        h1 {
            margin-bottom: 30px;
            color: white;
            font-size: 2rem;
        }

        button {
            padding: 12px 28px;
            font-size: 18px;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            margin: 10px;
            transition: 0.3s ease;
        }

        #yesBtn {
            background: #4CAF50;
            color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        #yesBtn:hover {
            transform: scale(1.1);
        }

        #noBtn {
            background: #f44336;
            color: white;
            position: absolute;
        }

        .accepted-message {
            position: absolute;
            font-size: 40px;
            color: white;
            font-weight: bold;
            animation: pop 1s ease forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(0);
                opacity: 0;
            }
            50% {
                transform: scale(1.3);
                opacity: 1;
            }
            100% {
                transform: scale(1);
            }
        }

        .heart {
            position: absolute;
            color: red;
            font-size: 25px;
            animation: float 4s linear forwards;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(1);
                opacity: 1;
            }
            100% {
                transform: translateY(-300px) scale(1.8);
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="box">
        <h1 id="msg-txt">Do you want to be friend of Suraj 🫣?</h1>

        <button id="yesBtn">Yes 💖</button>
        <button id="noBtn">No 😅</button>
    </div>

    <script>
        const noBtn = document.getElementById("noBtn");
        const yesBtn = document.getElementById("yesBtn");

        // Moving No button
        noBtn.addEventListener("mouseenter", moveButton);
        noBtn.addEventListener("touchstart", moveButton);

        function moveButton() {
            const x = Math.random() * (window.innerWidth - noBtn.clientWidth);
            const y = Math.random() * (window.innerHeight - noBtn.clientHeight);

            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        }

        // Accept action
        yesBtn.addEventListener("click", accepted);

        function accepted() {

            // Hide buttons
            yesBtn.style.display = "none";
            noBtn.style.display = "none";
            document.getElementById('msg-txt').style.display="None";

            // Change background
            document.body.style.background =
                "linear-gradient(135deg, #ff9a9e, #fad0c4)";

            // Create message
            const msg = document.createElement("div");
            msg.className = "accepted-message";
            msg.innerHTML = "Yayyy 💖<br>Thank you komal🥳";
            document.body.appendChild(msg);

            // Hearts animation
            for (let i = 0; i < 40; i++) {
                createHeart();
            }

            // Confetti effect
            startConfetti();

            // Voice effect
            // const audio = new Audio(
            //     "https://www.myinstants.com/media/sounds/tuturu_1.mp3"
            // );
            // audio.play();
        }

        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            heart.innerHTML = "💖";

            heart.style.left = Math.random() * window.innerWidth + "px";
            heart.style.top = window.innerHeight + "px";
            heart.style.fontSize = (20 + Math.random() * 30) + "px";

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 4000);
        }

        // Simple confetti
        function startConfetti() {
            for (let i = 0; i < 100; i++) {
                const confetti = document.createElement("div");

                confetti.style.position = "absolute";
                confetti.style.width = "10px";
                confetti.style.height = "10px";
                confetti.style.background =
                    `hsl(${Math.random() * 360},100%,50%)`;

                confetti.style.left = Math.random() * window.innerWidth + "px";
                confetti.style.top = "-10px";

                confetti.style.borderRadius = "50%";

                document.body.appendChild(confetti);

                let fall = Math.random() * 5 + 3;

                const interval = setInterval(() => {
                    confetti.style.top =
                        parseFloat(confetti.style.top) + fall + "px";

                    if (parseFloat(confetti.style.top) > window.innerHeight) {
                        confetti.remove();
                        clearInterval(interval);
                    }
                }, 20);
            }
        }
    </script>

</body>
</html>
